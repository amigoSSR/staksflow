# ╔══════════════════════════════════════════════════════════════════╗
# ║     STAKS FLOW — Nginx Reverse Proxy Configuration              ║
# ║  File: /etc/nginx/sites-available/staksflow                     ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Setup steps:
#   sudo cp nginx.conf /etc/nginx/sites-available/staksflow
#   sudo ln -s /etc/nginx/sites-available/staksflow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zone ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL Certificates (via Certbot) ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header Referrer-Policy           "strict-origin"         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Client Config ─────────────────────────────────────────────────────────
    client_max_body_size 5M;

    # ── Static Files (served directly by Nginx for speed) ─────────────────────
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|map)$ {
        root /var/www/staksflow/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API Rate Limiting ─────────────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    location /api/auth/register {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Socket.IO WebSocket ───────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ── Main App Proxy ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Access & Error Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/staksflow-access.log;
    error_log  /var/log/nginx/staksflow-error.log warn;
}
