<section id="sec-duty" class="a-section">
        <div class="a-card">
          <div class="a-card-header">
            <h2><i class="bi bi-calendar2-week-fill"></i> Jadwal Piket</h2>
            <button class="a-btn-primary" id="btnAddDuty" onclick="openDutyModal()">
              <i class="bi bi-plus-lg"></i> Tambah Jadwal
            </button>
          </div>
          <div id="dutyScheduleContainer" class="duty-grid"></div>
        </div>
      </section>
<!-- DUTY MODAL -->
    <div class="a-modal-overlay" id="dutyModalOverlay">
      <div class="a-modal" style="max-width: 420px">
        <div class="a-modal-header">
          <h3 id="dutyModalTitle">Tambah Jadwal Piket</h3>
          <button onclick="closeDutyModal()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="a-form-group">
          <label class="a-form-label"
            >Kategori <span style="color: var(--danger)">*</span></label
          >
          <select id="dutyDay" class="a-select" style="width: 100%">
            <option value="">— Pilih Hari —</option>
            <option value="Senin">Senin</option>
            <option value="Selasa">Selasa</option>
            <option value="Rabu">Rabu</option>
            <option value="Kamis">Kamis</option>
            <option value="Jumat Ganjil">Jumat Ganjil</option>
            <option value="Sabtu Ganjil">Sabtu Ganjil</option>
            <option value="Jumat Genap">Jumat Genap</option>
            <option value="Sabtu Genap">Sabtu Genap</option>
          </select>
          <span class="a-form-error" id="dutyDayErr"></span>
        </div>
        <div class="a-form-group">
          <label class="a-form-label"
            >Nama Anggota <span style="color: var(--danger)">*</span></label
          >
          <input
            type="text"
            id="dutyMember"
            class="a-form-input"
            placeholder="Contoh: Budi Santoso"
            maxlength="80"
          />
          <span class="a-form-error" id="dutyMemberErr"></span>
        </div>
        <div class="a-modal-actions" style="margin-top: 8px">
          <button class="a-btn-cancel" onclick="closeDutyModal()">Batal</button>
          <button class="a-btn-save" id="btnSaveDuty" onclick="saveDuty()">
            <i class="bi bi-floppy-fill"></i> Simpan
          </button>
        </div>
        <input type="hidden" id="editingDutyId" />
      </div>
    </div>
