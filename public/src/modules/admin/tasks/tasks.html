<section id="sec-tasks" class="a-section">
  <div class="a-card">
    <div class="a-card-header">
      <h2><i class="bi bi-journal-text"></i> Diary & Aktivitas Anggota</h2>
      <div class="a-filters" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <select id="filterProject" onchange="filterDiaries()" class="a-select">
          <option value="all">Semua Proyek</option>
        </select>
        <select id="filterUser" onchange="filterDiaries()" class="a-select">
          <option value="all">Semua Anggota</option>
        </select>
        <input type="month" id="filterMonth" onchange="filterDiaries()" class="a-select" style="min-width: 140px;" />
        <div class="a-search-box">
          <i class="bi bi-search"></i>
          <input
            type="text"
            id="diarySearch"
            placeholder="Cari diary atau user..."
            oninput="filterDiaries()"
          />
        </div>
      </div>
    </div>
    <div class="a-table-wrap">
      <table class="a-table">
        <thead>
          <tr>
            <th>Judul Diary & Deskripsi</th>
            <th>Anggota</th>
            <th>Proyek</th>
            <th>Progress Kerja</th>
            <th>Tanggal</th>
            <th style="width: 80px; text-align: center;">Aksi</th>
          </tr>
        </thead>
        <tbody id="tasksTableBody">
          <tr>
            <td colspan="6" class="a-empty">
              <div class="a-spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
