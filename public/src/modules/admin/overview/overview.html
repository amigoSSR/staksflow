<section id="sec-overview" class="a-section active">
  <div class="a-stats-row" id="statsRow" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px;">
    <div class="a-stat-card">
      <div class="a-stat-icon purple">
        <i class="bi bi-people-fill"></i>
      </div>
      <div>
        <div class="a-stat-num" id="s-users">0</div>
        <div class="a-stat-lbl">Total Users</div>
      </div>
    </div>
    <div class="a-stat-card">
      <div class="a-stat-icon blue">
        <i class="bi bi-journal-text"></i>
      </div>
      <div>
        <div class="a-stat-num" id="s-tasks">0</div>
        <div class="a-stat-lbl">Total Catatan Diary</div>
      </div>
    </div>
    <div class="a-stat-card">
      <div class="a-stat-icon orange">
        <i class="bi bi-trophy-fill"></i>
      </div>
      <div>
        <div class="a-stat-num a-stat-sm" id="s-active">-</div>
        <div class="a-stat-lbl">User Paling Aktif (All Time)</div>
      </div>
    </div>
  </div>

  <!-- Weekly Active Users Leaderboard -->
  <div class="a-card">
    <div class="a-card-header">
      <h2><i class="bi bi-fire" style="color:#f87171;"></i> User Teraktif Pekan Ini</h2>
      <div style="font-size: 11px; color: var(--at-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Rolling 7 Hari Terakhir</div>
    </div>
    <div class="a-table-wrap">
      <table class="a-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Proyek Saat Ini</th>
            <th style="text-align: center;">Total Aktivitas</th>
            <th style="width: 200px;">Aktivitas Bar</th>
          </tr>
        </thead>
        <tbody id="weeklyLeaderboardBody">
          <tr>
            <td colspan="4" class="a-empty">
              <div class="a-spinner" style="width:24px; height:24px; border-width:3px;"></div>
              <div style="margin-top:10px; font-size:12px;">Menghitung aktivitas pekan ini...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
